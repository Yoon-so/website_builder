<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1 class="title">당신만의 웹사이트를 만들어보세요</h1> 
        <p>간단히 시작하여 전문적인 웹사이트를 만들어보세요.</p>
    
        <a href="templates.html">템플릿 보기</a>
        <a href="builder.html">웹사이트 빌더 열기</a>
    </header>

    <section class="features">

        <div class="feature">
            <h3>간편한 웹사이트 제작</h3>
            <p>빠르게 웹사이트를 만들 수 있습니다.</p>
        </div>

        <div class="feature">
            <h3>맞춤형 컴포넌트</h3>
            <p>필요한 기능의 버튼이나 검색창 등을 추가하고 자유롭게 커스터마이징할 수 있습니다.</p>
        </div>

    </section>

    <section class="templates">
        <h2>인기 템플릿</h2>

        <div class="template">
            <img src="images/store.jpg" alt="Online Store">
            <h3>온라인 스토어</h3>
        </div>

        <div class="template">
            <img src="images/blog.jpg" alt="Blog">
            <h3>블로그</h3>
        </div>

    </section>
  
    <section class="call-to-action">
        <h2>꿈의 웹사이트를 만들 준비가 되셨나요?</h2>
        <p></p>
        <a href="builder.html" class="btn">웹사이트 빌더 열기</a>
    </section>
    <footer></footer>

    
    
</body>

</html>
